<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 - GitManager</title>
</head>
<body>
  <h2>로그인</h2>

  <label>아이디 또는 이메일</label><br>
  <input id="identifier" type="text" placeholder="hong123 또는 hong@example.com"><br><br>

  <label>비밀번호</label><br>
  <input id="password" type="password" placeholder="••••••••"><br><br>

  <button onclick="login()">로그인</button><br><br>

  <div id="msg"></div>
  <pre id="resultText"></pre>
  <a href="/register.html">계정이 없으신가요? 회원가입</a>

  <script>
    async function login() {
      const msg = document.getElementById('msg');
      const resultText = document.getElementById('resultText');
      msg.textContent = '요청 중...';
      resultText.textContent = '';

      const body = {
        identifier: document.getElementById('identifier').value.trim(),
        password:   document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.success) {
          msg.textContent = '로그인 성공!';
          resultText.textContent = JSON.stringify(data.data, null, 2);
        } else if (data.error?.code === 'EMAIL_NOT_VERIFIED') {
          const email = data.data?.email ?? body.identifier;
          location.href = '/verify.html?email=' + encodeURIComponent(email);
        } else {
          msg.textContent = '[오류] ' + (data.error?.message ?? JSON.stringify(data.error));
        }
      } catch (e) {
        msg.textContent = '서버에 연결할 수 없습니다.';
      }
    }
  </script>
</body>
</html>
