<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이메일 인증 - GitManager</title>
</head>
<body>
  <h2>이메일 인증</h2>
  <p>가입하신 이메일로 발송된 6자리 인증 코드를 입력해주세요.</p>

  <label>이메일</label><br>
  <input id="email" type="email" placeholder="hong@example.com"><br><br>

  <label>인증 코드 (6자리)</label><br>
  <input id="code" type="text" maxlength="6" placeholder="123456"><br><br>

  <button onclick="verify()">인증 확인</button><br><br>

  <div id="msg"></div>
  <a href="/login.html">로그인 페이지로</a>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('email')) {
      document.getElementById('email').value = params.get('email');
    }

    async function verify() {
      const msg = document.getElementById('msg');
      msg.textContent = '요청 중...';

      const body = {
        email: document.getElementById('email').value.trim(),
        code:  document.getElementById('code').value.trim()
      };

      try {
        const res = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.success) {
          msg.textContent = '이메일 인증 완료! 로그인 페이지로 이동합니다.';
          setTimeout(() => { location.href = '/login.html'; }, 1500);
        } else {
          msg.textContent = '[오류] ' + (data.error?.message ?? JSON.stringify(data.error));
        }
      } catch (e) {
        msg.textContent = '서버에 연결할 수 없습니다.';
      }
    }
  </script>
</body>
</html>
