<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 - GitManager</title>
</head>
<body>
  <h2>회원가입</h2>

  <label>이름</label><br>
  <input id="name" type="text" placeholder="홍길동"><br><br>

  <label>아이디 (영문+숫자, 5~20자)</label><br>
  <input id="loginId" type="text" placeholder="hong123"><br><br>

  <label>이메일</label><br>
  <input id="email" type="email" placeholder="hong@example.com"><br><br>

  <label>비밀번호 (8자 이상)</label><br>
  <input id="password" type="password" placeholder="••••••••"><br><br>

  <button onclick="register()">회원가입</button><br><br>

  <div id="msg"></div>
  <a href="/login.html">이미 계정이 있으신가요? 로그인</a>

  <script>
    async function register() {
      const msg = document.getElementById('msg');
      msg.textContent = '요청 중...';

      const body = {
        name:     document.getElementById('name').value.trim(),
        loginId:  document.getElementById('loginId').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.success) {
          msg.textContent = '회원가입 성공! 이메일로 발송된 인증 코드를 확인해주세요.';
          setTimeout(() => {
            location.href = '/verify.html?email=' + encodeURIComponent(body.email);
          }, 1500);
        } else {
          msg.textContent = '[오류] ' + (data.error?.message ?? JSON.stringify(data.error));
        }
      } catch (e) {
        msg.textContent = '서버에 연결할 수 없습니다.';
      }
    }
  </script>
</body>
</html>
